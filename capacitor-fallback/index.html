<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MessagingApp</title>
  <style>
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center;
           font: 16px -apple-system, system-ui, sans-serif; color: #444;
           background: #fff; }
    main { text-align: center; padding: 2rem; }
    .spinner { width: 24px; height: 24px; border-radius: 50%;
               border: 3px solid #e3e3e8; border-top-color: #0a6cff;
               margin: 0 auto 1rem; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p.hint { color: #888; font-size: 0.85rem; margin-top: 1.25rem; }
  </style>
</head>
<body>
  <main>
    <div class="spinner"></div>
    <div>Connecting…</div>
    <p class="hint">If this hangs, check your internet connection.</p>
  </main>
</body>
</html>
